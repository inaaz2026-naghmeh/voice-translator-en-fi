<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceFlow - Real-time Voice Translator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="app-container">
        <header>
            <div class="logo">
                <span class="logo-icon">🌐</span>
                <h1>VoiceFlow</h1>
            </div>
            <p class="subtitle">Seamless English & Finnish Voice Translation</p>
        </header>

        <section class="translator-controls">
            <div class="toggle-container">
                <span class="lang-label" id="label-en">English</span>
                <label class="switch">
                    <input type="checkbox" id="lang-toggle">
                    <span class="slider round"></span>
                </label>
                <span class="lang-label" id="label-fi">Finnish</span>
            </div>
            
            <div class="status-indicator">
                <div class="pulse-ring" id="pulse"></div>
                <div class="status-dot" id="status-dot"></div>
                <span id="status-text">Ready to listen...</span>
            </div>
        </section>

        <section class="display-area">
            <div class="card transcribed-card">
                <div class="card-header">
                    <span class="card-icon">🎤</span>
                    <h3>Living Transcription</h3>
                </div>
                <div class="text-content" id="transcribed-text">
                    <span class="placeholder">Your voice will appear here as you speak...</span>
                </div>
            </div>

            <div class="card translated-card">
                <div class="card-header">
                    <span class="card-icon">✨</span>
                    <h3>Instant Translation</h3>
                </div>
                <div class="text-content" id="translated-text">
                    <span class="placeholder">Translation will show up here...</span>
                </div>
            </div>
        </section>

        <footer>
            <div class="mic-button-container">
                <button id="mic-btn" class="mic-btn" aria-label="Start Listening">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" fill="currentColor"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <line x1="12" y1="19" x2="12" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <line x1="8" y1="23" x2="16" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
        </footer>
    </main>

    <script src="app.js"></script>
</body>
</html>
